version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: conectaescola-postgres
    restart: always
    environment:
      POSTGRES_DB: conectaescola
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: conectaescola-redis
    restart: always
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    container_name: conectaescola-backend
    depends_on:
      - postgres
      - redis
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - '4000:4000'

volumes:
  pgdata:
